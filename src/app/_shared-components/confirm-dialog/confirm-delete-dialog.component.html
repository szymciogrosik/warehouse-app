<h1 mat-dialog-title class="dialog-title-custom-class">{{ 'confirmation.dialog.title' | translate }}</h1>
<mat-dialog-content>
  {{ 'confirmation.dialog.message' | translate }}
</mat-dialog-content>
<mat-dialog-actions>
  <div class="app-popup-full-width-actions">
    <button mat-raised-button color="accent" class="app-action-button" (click)="dialogRef.close(false)">
      {{ 'confirmation.dialog.cancel' | translate }}
    </button>
    <button mat-raised-button color="warn" class="app-action-button" (click)="dialogRef.close(true)">
      {{ 'confirmation.dialog.remove' | translate }}
    </button>
  </div>
</mat-dialog-actions>
